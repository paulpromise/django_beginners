<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Detail</title>
    {% extends "base.html" %}
</head>
<body>
    {% block content %}
    <div class='post_entry'>
        <h2> {{object.title}} </h2>
        <p> {{ post.body }} </p>
    </div>

    <div class="btn">
        <a href="{% url 'edit-post' post.pk %}">Edit Blog Post</a>
        <a href="{% url 'post-delete' post.pk %}">Delete Blog Post</a>
    </div>
    {% endblock content %}
    
</body>
</html>
